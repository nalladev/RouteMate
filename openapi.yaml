openapi: 3.0.0
info:
  title: RouteMate Backend API
  version: 1.0.0
  description: |
    RouteMate is a carpooling/ride-sharing application backend API.
    This specification documents all available endpoints for mobile clients and web applications.
  contact:
    name: RouteMate Team
    url: https://routemate.app
  license:
    name: ISC

servers:
  - url: https://routemate-jpsc.onrender.com/api
    description: Production server
  - url: http://localhost:3000/api
    description: Development server

tags:
  - name: Health
    description: Server health and status endpoints
  - name: Authentication
    description: User authentication and token generation
  - name: Error Logging
    description: Client error logging to Telegram
  - name: User
    description: User profile and wallet management
  - name: Driver
    description: Driver session and ride management
  - name: Passenger
    description: Passenger ride requests
  - name: Rides
    description: Active ride management and matching
  - name: Proxy
    description: Proxies to external services (Nominatim, OSRM)

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check endpoint
      description: Returns server status and uptime
      parameters:
        - in: header
          name: X-Self-Ping
          schema:
            type: string
          description: Internal header for self-ping mechanism
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time
                  uptime:
                    type: number
                    description: Server uptime in seconds

  /auth/login:
    post:
      tags:
        - Authentication
      summary: Login with phone number
      description: Get or create user by phone number and return authentication tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phone
              properties:
                phone:
                  type: string
                  example: '+1234567890'
                  description: User's phone number with country code
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '400':
          description: Phone number is required
        '500':
          description: Error processing login

  /auth/firebase:
    post:
      tags:
        - Authentication
      summary: Authenticate with Firebase token
      description: Verify Firebase ID token and return backend JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - firebaseToken
              properties:
                firebaseToken:
                  type: string
                  description: Firebase ID token
                phoneNumber:
                  type: string
                  description: Optional phone number for new user creation
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '401':
          description: Invalid Firebase token

  /auth/phone-email:
    post:
      tags:
        - Authentication
      summary: Authenticate with phone.email JWT token
      description: Verify phone.email service JWT token and return backend JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - jwtToken
              properties:
                jwtToken:
                  type: string
                  description: JWT token from phone.email service
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '401':
          description: Invalid JWT token

  /logs/error:
    post:
      tags:
        - Error Logging
      summary: Submit error log from client
      description: |
        Receives error logs from client applications and logs them to Telegram chat.
        The error information is formatted and sent to a Telegram bot configured via environment variables.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorLog'
      responses:
        '202':
          description: Error log received and will be processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Error log received and will be processed
                  errorId:
                    type: string
                    description: Identifier for the error log
        '400':
          description: Missing required fields
        '500':
          description: Error processing error log

    get:
      tags:
        - Error Logging
      summary: Retrieve error logs
      description: Fetch historical error logs from Firestore (requires STORE_ERROR_LOGS=true)
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
          description: Maximum number of logs to return
      responses:
        '200':
          description: List of error logs
          content:
            application/json:
              schema:
                type: object
                properties:
                  errorLogs:
                    type: array
                    items:
                      $ref: '#/components/schemas/ErrorLogResponse'
        '500':
          description: Error fetching logs

  /user/profile:
    get:
      tags:
        - User
      summary: Get user profile
      description: Retrieve current user's profile information
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User profile retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  profile:
                    $ref: '#/components/schemas/UserProfile'
        '401':
          description: Unauthorized
        '404':
          description: User not found

  /user/wallet:
    get:
      tags:
        - User
      summary: Get wallet points
      description: Retrieve user's current wallet points balance
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Wallet balance retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  walletPoints:
                    type: number

  /user/rewards:
    get:
      tags:
        - User
      summary: Get user rewards
      description: Retrieve user's earned rewards
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Rewards retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  rewards:
                    type: array
                    items:
                      $ref: '#/components/schemas/Reward'

  /user/location:
    put:
      tags:
        - User
      summary: Update user location
      description: Update user's current location with heading and speed
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - location
              properties:
                location:
                  $ref: '#/components/schemas/Location'
                heading:
                  type: number
                  example: 45.5
                  description: Direction heading in degrees
                speed:
                  type: number
                  example: 60
                  description: Speed in km/h
                accuracy:
                  type: number
                  example: 10
                  description: GPS accuracy in meters
      responses:
        '200':
          description: Location updated successfully

  /driver/session:
    post:
      tags:
        - Driver
      summary: Start driving session
      description: Driver starts a new session with destination
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - destination
              properties:
                destination:
                  $ref: '#/components/schemas/LocationWithDetails'
      responses:
        '201':
          description: Session started successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  sessionId:
                    type: string

    delete:
      tags:
        - Driver
      summary: End driving session
      description: Driver ends their active driving session
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Session ended successfully

  /driver/update-location:
    put:
      tags:
        - Driver
      summary: Update driver location
      description: Driver updates their current location during active session
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - location
              properties:
                location:
                  $ref: '#/components/schemas/Location'
                heading:
                  type: number
                speed:
                  type: number
      responses:
        '200':
          description: Location updated successfully

  /driver/nearby-requests:
    get:
      tags:
        - Driver
      summary: Get nearby passenger requests
      description: Retrieve passenger ride requests compatible with driver's route
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Compatible requests retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  requests:
                    type: array
                    items:
                      $ref: '#/components/schemas/RideRequest'

  /passenger/request-ride:
    post:
      tags:
        - Passenger
      summary: Request a ride
      description: Passenger creates a new ride request
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - pickup
                - destination
              properties:
                pickup:
                  $ref: '#/components/schemas/LocationWithDetails'
                destination:
                  $ref: '#/components/schemas/LocationWithDetails'
                preferences:
                  type: object
                  properties:
                    maxWaitTime:
                      type: number
                      description: Max wait time in minutes
                    maxWalkDistance:
                      type: number
                      description: Max walk distance in meters
                    priceRange:
                      type: object
                      properties:
                        min:
                          type: number
                        max:
                          type: number
      responses:
        '201':
          description: Ride request created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  requestId:
                    type: string

  /passenger/nearby-drivers:
    get:
      tags:
        - Passenger
      summary: Find nearby drivers
      description: Retrieve nearby drivers available for passenger's active ride request
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Available drivers retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  drivers:
                    type: array
                    items:
                      $ref: '#/components/schemas/NearbyDriver'

  /passenger/request-status:
    get:
      tags:
        - Passenger
      summary: Get request status
      description: Get status of passenger's active ride request
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Request status retrieved

  /passenger/cancel-request:
    delete:
      tags:
        - Passenger
      summary: Cancel ride request
      description: Cancel passenger's active ride request
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Request cancelled successfully

  /rides/match:
    post:
      tags:
        - Rides
      summary: Match driver with passenger
      description: Driver matches with a passenger's ride request
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - requestId
                - sessionId
              properties:
                requestId:
                  type: string
                sessionId:
                  type: string
      responses:
        '201':
          description: Ride matched successfully

  /rides/{rideId}/status:
    put:
      tags:
        - Rides
      summary: Update ride status
      description: Update the status of an active ride (en_route_to_pickup, arrived_at_pickup, in_progress, completed)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: rideId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum:
                    - en_route_to_pickup
                    - arrived_at_pickup
                    - in_progress
                    - completed
      responses:
        '200':
          description: Ride status updated

  /proxy/search-places:
    get:
      tags:
        - Proxy
      summary: Search places (Nominatim)
      description: Search for places using OpenStreetMap Nominatim API
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
          description: Search query
      responses:
        '200':
          description: Search results retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  places:
                    type: array
                    items:
                      type: object

  /proxy/route:
    get:
      tags:
        - Proxy
      summary: Get route (OSRM)
      description: Get driving route between two points using OSRM
      parameters:
        - in: query
          name: start
          required: true
          schema:
            type: string
          description: Start coordinates "longitude,latitude"
        - in: query
          name: end
          required: true
          schema:
            type: string
          description: End coordinates "longitude,latitude"
      responses:
        '200':
          description: Route retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  points:
                    type: array
                    items:
                      type: array
                      items:
                        type: number

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: JWT token obtained from authentication endpoints

  schemas:
    Location:
      type: object
      required:
        - latitude
        - longitude
      properties:
        latitude:
          type: number
          example: 40.7128
        longitude:
          type: number
          example: -74.0060

    LocationWithDetails:
      allOf:
        - $ref: '#/components/schemas/Location'
        - type: object
          properties:
            name:
              type: string
              example: "Times Square"
            displayName:
              type: string
              description: Display name for the location
            placeId:
              type: string
              description: Place ID from location service

    AuthTokens:
      type: object
      properties:
        firebaseToken:
          type: string
          description: Firebase authentication token
        backendToken:
          type: string
          description: JWT token for API authentication
        uid:
          type: string
          description: User ID

    UserProfile:
      type: object
      properties:
        uid:
          type: string
        phone:
          type: string
        walletPoints:
          type: number
        stats:
          type: object
          properties:
            totalRidesAsDriver:
              type: number
            totalRidesAsPassenger:
              type: number
            rating:
              type: number
            totalPointsEarned:
              type: number
        location:
          type: object
          properties:
            latitude:
              type: number
            longitude:
              type: number
            updatedAt:
              type: string
              format: date-time

    Reward:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        type:
          type: string
          enum:
            - bonus
            - driver_completion
            - passenger_completion
        amount:
          type: number
        description:
          type: string
        status:
          type: string
          enum:
            - active
            - used
            - expired
        dateEarned:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time

    ErrorLog:
      type: object
      required:
        - errorType
        - message
      properties:
        timestamp:
          type: string
          format: date-time
          description: When the error occurred
        appVersion:
          type: string
          example: "1.0.0"
        userId:
          type: string
          description: User ID (optional, for context)
        errorType:
          type: string
          example: "NullPointerException"
        message:
          type: string
          example: "Attempted to access null object"
        stackTrace:
          type: string
          description: Full stack trace
        context:
          type: object
          description: Additional context data
          additionalProperties: true

    ErrorLogResponse:
      allOf:
        - $ref: '#/components/schemas/ErrorLog'
        - type: object
          properties:
            id:
              type: string
            createdAt:
              type: string
              format: date-time
            receivedAt:
              type: string
              format: date-time

    RideRequest:
      type: object
      properties:
        id:
          type: string
        passengerId:
          type: string
        pickup:
          $ref: '#/components/schemas/LocationWithDetails'
        destination:
          $ref: '#/components/schemas/LocationWithDetails'
        estimatedDistance:
          type: number
        estimatedDetour:
          type: number
        preferences:
          type: object
          properties:
            maxWaitTime:
              type: number
            maxWalkDistance:
              type: number

    NearbyDriver:
      type: object
      properties:
        driverId:
          type: string
        sessionId:
          type: string
        currentLocation:
          $ref: '#/components/schemas/Location'
        destination:
          $ref: '#/components/schemas/LocationWithDetails'
        estimatedArrival:
          type: number
          description: Estimated arrival time in minutes
        availableSeats:
          type: number
