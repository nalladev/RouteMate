name: routemate
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.9

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  location: ^5.0.3
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  http: ^1.1.2
  flutter_launcher_icons: ^0.13.1
  phone_email_auth: ^0.0.6
  provider: ^6.1.1
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icon/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 23
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/icon.png"