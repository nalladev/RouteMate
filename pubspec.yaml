name: routemate
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.9

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  location: any
  flutter_map: any
  latlong2: any
  http: any
  flutter_launcher_icons: any
  provider: any
  intl: any
  shared_preferences: any
  firebase_core: any
  firebase_auth: any
  google_sign_in: any
  phone_email_auth: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icon/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 23
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/icon.png"
